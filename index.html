<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Math Learning - Học Toán thông minh</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="app-wrapper">
        <!-- Header -->
        <header class="main-header">
            <div class="header-inner">
                <div class="logo-area">
                    <div class="logo-icon">
                        <i class="fas fa-brain"></i>
                    </div>
                    <div class="logo-text">
                        <h1>AI Math Learning</h1>
                        <p>Học Toán với trí tuệ nhân tạo</p>
                    </div>
                </div>
                <div class="stats-area">
                    <div class="stat-badge">
                        <i class="fas fa-star"></i>
                        <span id="highScore">0</span>
                        <small>điểm cao</small>
                    </div>
                    <div class="stat-badge">
                        <i class="fas fa-clipboard-list"></i>
                        <span id="totalQuizzes">0</span>
                        <small>bài đã làm</small>
                    </div>
                </div>
            </div>
        </header>

        <!-- Control Bar -->
        <div class="control-bar">
            <div class="control-inner">
                <div class="filter-group">
                    <div class="filter-item">
                        <label><i class="fas fa-graduation-cap"></i> Lớp</label>
                        <select id="grade">
                            <option value="5">Lớp 5</option>
                            <option value="6">Lớp 6</option>
                            <option value="7">Lớp 7</option>
                            <option value="8">Lớp 8</option>
                            <option value="9">Lớp 9</option>
                            <option value="10">Lớp 10</option>
                            <option value="11">Lớp 11</option>
                            <option value="12">Lớp 12</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <label><i class="fas fa-book"></i> Chủ đề</label>
                        <select id="topic">
                            <option value="all">📐 Tất cả</option>
                            <option value="Số học">🔢 Số học</option>
                            <option value="Đại số">📊 Đại số</option>
                            <option value="Hình học">📐 Hình học</option>
                            <option value="Phân số">🥧 Phân số</option>
                            <option value="Phương trình">⚖️ Phương trình</option>
                            <option value="Hàm số">📈 Hàm số</option>
                        </select>
                    </div>
                </div>
                <button id="newQuestionsBtn" class="btn-new">
                    <i class="fas fa-sync-alt"></i> Làm bài mới
                </button>
            </div>
        </div>

        <!-- Main Content -->
        <main class="main-content">
            <div id="quizContainer">
                <div class="welcome-card">
                    <div class="welcome-icon">
                        <i class="fas fa-robot"></i>
                    </div>
                    <h2>Chào mừng đến với AI Math Learning</h2>
                    <p>Mỗi bài học gồm 10 câu hỏi trắc nghiệm được AI tạo riêng cho trình độ của bạn</p>
                    <button id="startBtn" class="btn-start">
                        <i class="fas fa-play"></i> Bắt đầu học ngay
                    </button>
                </div>
            </div>

            <div id="resultContainer" style="display: none;">
                <div class="result-card">
                    <h2 style="margin-bottom: 8px;">📊 Kết quả bài làm</h2>
                    <div class="result-score">
                        <div class="score-circle">
                            <span class="score-number" id="scoreNumber">0</span>
                        </div>
                        <div class="score-label">trên 10 câu</div>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div id="detailedAnswers"></div>
                    <div class="result-actions">
                        <button id="reviewBtn" class="btn-review">
                            <i class="fas fa-eye"></i> Xem đáp án
                        </button>
                        <button id="newQuizBtn" class="btn-new-quiz">
                            <i class="fas fa-play"></i> Làm bài mới
                        </button>
                    </div>
                </div>
            </div>

            <!-- History Section -->
            <div class="history-section">
                <div class="history-header" onclick="toggleHistory()">
                    <i class="fas fa-clock"></i>
                    <h3>Lịch sử làm bài</h3>
                    <i class="fas fa-chevron-down" id="historyToggleIcon"></i>
                </div>
                <div id="historyList" class="history-list">
                    <div class="empty-history">Chưa có bài làm nào</div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
